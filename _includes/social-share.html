{% include base_path %}

<section class="page__share">
  {% if site.data.ui-text[site.locale].share_on_label %}
    <h4 class="page__share-title">Share</h4>
  {% endif %}

  <button class="share-copy-link" type="button" data-share-url="{{ site.url }}{{ base_path }}{{ page.url }}">Copy link</button>

  <a href="https://www.linkedin.com/shareArticle?mini=true&url={{ site.url }}{{ base_path }}{{ page.url }}" class="share-linkedin" title="Share on LinkedIn"><i class="fab fa-linkedin" aria-hidden="true"></i><span> LinkedIn</span></a>
</section>
