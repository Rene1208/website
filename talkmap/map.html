<!DOCTYPE html>
<html>
<head>
    <title>Talk Map</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="leaflet_dist/screen.css"/>
    <style>
      html,
      body,
      #map {
        height: 100%;
        margin: 0;
        background: #f6f4ef;
      }

      .leaflet-container {
        font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .leaflet-popup-content-wrapper {
        border-radius: 8px;
        box-shadow: 0 18px 50px rgba(22, 32, 41, 0.18);
      }

      .leaflet-popup-content {
        margin: 14px 16px;
        color: #17212b;
        font-weight: 650;
      }
    </style>

    <link rel="stylesheet" href="leaflet_dist/MarkerCluster.css"/>
    <link rel="stylesheet" href="leaflet_dist/MarkerCluster.Default.css"/>
    <script src="leaflet_dist/leaflet.markercluster-src.js"></script>
</head>
<body>
    <div id="map"></div>
<script type="text/javascript">
    var tiles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '&copy; OpenStreetMap contributors'
        }),
        latlng = L.latLng(45, 12);
    var map = L.map('map', {center: latlng, zoom: 3, layers: [tiles], scrollWheelZoom: false});
    var markers = L.markerClusterGroup({
        showCoverageOnHover: false,
        maxClusterRadius: 80
    });

    // Fetch location data from JSON file
    fetch('/talkmap/locations.json')
        .then(response => response.json())
        .then(data => {
            var addressPoints = [];
            Object.keys(data).forEach(location => {
                var coords = data[location];
                addressPoints.push([location, coords[0], coords[1]]);
            });

            for (var i = 0; i < addressPoints.length; i++) {
                var a = addressPoints[i];
                var title = a[0];
                var marker = L.marker(new L.LatLng(a[1], a[2]), {title: title});
                marker.bindPopup(title);
                markers.addLayer(marker);
            }
            map.addLayer(markers);
            if (markers.getLayers().length > 0) {
                map.fitBounds(markers.getBounds(), {padding: [28, 28]});
            }
        })
        .catch(error => console.error('Error loading location data:', error));
</script>
</body>
</html>
