<!DOCTYPE html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  {% include head.html %}
  {% include head/custom.html %}
</head>

<body>

{% include browser-upgrade.html %}
{% include masthead.html %}

<script src="https://cdnjs.cloudflare.com/ajax/libs/wow/1.1.2/wow.min.js"></script>
<script>
  new WOW().init();
</script>

{{ content }}

<div class="page__footer">
  <footer>
    {% include footer/custom.html %}
    {% include footer.html %}
  </footer>
</div>

{% include scripts.html %}

<script>
  document.addEventListener('DOMContentLoaded', function() {
    document.body.classList.add('fade-in');

    var nav = document.getElementById('site-nav-static');
    var toggle = nav ? nav.querySelector('.mobile-menu-toggle') : null;
    if (toggle) {
      toggle.addEventListener('click', function() {
        var isOpen = nav.classList.toggle('is-open');
        toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      });
    }

    document.querySelectorAll('.share-copy-link').forEach(function(button) {
      button.addEventListener('click', function() {
        var url = button.getAttribute('data-share-url') || window.location.href;
        var markCopied = function() {
          button.textContent = 'Copied';
          window.setTimeout(function() { button.textContent = 'Copy link'; }, 1600);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url).then(function() {
            markCopied();
          });
        } else {
          var input = document.createElement('input');
          input.value = url;
          document.body.appendChild(input);
          input.select();
          document.execCommand('copy');
          document.body.removeChild(input);
          markCopied();
        }
      });
    });
  });
</script>

</body>
</html>
